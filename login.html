<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindYourNeed - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary py-3">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold fs-3">FindYourNeed</span>
            <div>
                <a href="login.html" class="btn btn-outline-light me-2">Iniciar Sesión</a>
                <a href="registro.html" class="btn btn-light text-dark fw-bold">Registrarse</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Inicia Sesión</h2>
                    <p class="text-muted">Ingresa tus credenciales para iniciar sesión</p>
                </div>
                <div id="alerta"></div>
                <div class="card p-4">
                    <form onsubmit="event.preventDefault(); login()">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email:</label>
                            <input type="email" id="inputEmail" class="form-control rounded-0" placeholder="correo@ejemplo.com" autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Contraseña:</label>
                            <input type="password" id="inputPassword" class="form-control rounded-0">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" id="btnLogin">Ingresar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="./js/login.js"></script>
</body>
</html>
