<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FyNe - Editar Prestador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary py-3">
        <div class="container">
            <span class="navbar-brand fw-bold">Editar Perfil de Prestador</span>
            <a href="prestadores.html" class="btn btn-outline-light rounded-0">Volver a la lista</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Modificar Datos</h3>
                    <p class="text-muted">Actualiza la zona o el teléfono de contacto</p>
                </div>
                
                <div id="alerta"></div>
                
                <div class="card p-4">
                    <form onsubmit="event.preventDefault(); guardarPrestador()">
                        <div class="mb-3">
                            <label class="form-label fw-bold">ID del Usuario (Propietario):</label>
                            <input type="number" id="usuarioId" class="form-control rounded-0 bg-light" disabled>
                            <small class="text-muted">El ID de usuario no se puede cambiar.</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">ID de Categoría (Oficio):</label>
                            <input type="number" id="categoriaId" class="form-control rounded-0 bg-light" disabled>
                            <small class="text-muted">El ID de categoría no se puede cambiar.</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Teléfono (10 dígitos):</label>
                            <input type="text" id="telefono" class="form-control rounded-0" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Zona de Cobertura:</label>
                            <input type="text" id="zona" class="form-control rounded-0" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg" id="btnGuardar">Guardar Cambios</button>
                            <a href="prestadores.html" class="btn btn-outline-dark">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/prestadores-editar.js"></script>
</body>
</html>
