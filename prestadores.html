<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Prestadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary py-3">
        <div class="container">
            <span class="navbar-brand fw-bold">Módulo: Prestadores</span>
            <a href="inicio.html" class="btn btn-outline-light rounded-0">Volver al Inicio</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Directorio de Oficios</h2>
            <a href="prestadores-registrar.html" class="btn btn-primary"> + Registrar Prestador</a>
        </div>
        
        <div class="mb-4">
            <input type="text" id="buscadorZona" class="form-control rounded-0 border-dark" placeholder="🔍 Buscar prestadores por Zona (Ej. Norte)..." onkeyup="buscarPorZona()">
        </div>

        <div id="alerta"></div>

        <div class="card p-0">
            <table class="table table-bordered mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Teléfono</th>
                        <th>Zona de Cobertura</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaPrestadores">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="./js/prestadores.js"></script>
</body>
</html>
