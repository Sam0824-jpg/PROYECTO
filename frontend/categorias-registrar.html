<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FyNe - Registrar Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <!-- Premium Monochromatic Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light py-3">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-2">
                    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-black">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <a class="navbar-brand" href="inicio.html">
                        FyNe
                        <span class="subtitle">Find your need</span>
                    </a>
                </div>
                
                <a href="inicio.html" class="nav-link ms-2 d-none d-md-block">Inicio</a>
                
                <button class="theme-toggle ms-2" aria-label="Cambiar tema">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></svg>
                </button>
            </div>

            <!-- Botones tipo Pill en el lado derecho -->
            <div class="d-flex align-items-center gap-2">
                <a href="categorias.html" class="nav-pill-btn bg-dark text-white border-dark">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Buscar
                </a>
                <a href="prestadores.html" class="nav-pill-btn d-none d-sm-flex">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                    Empleo
                </a>
                <a href="inicio.html" class="nav-pill-btn d-none d-sm-flex">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Mi Perfil
                </a>
                <button class="btn p-0 border-0 fs-4 text-black ms-1" style="background: none; outline: none;">
                    ☰
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="text-center mb-4">
                    <h3 class="fw-bold fs-4">Añadir Oficio al Catálogo</h3>
                    <p class="text-muted">Crea una nueva categoría para agrupar a los trabajadores</p>
                </div>
                
                <div id="alerta"></div>
                
                <div class="card p-4 shadow-sm border-0 bg-white">
                    <form onsubmit="event.preventDefault(); guardarCategoria()">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Nombre del Oficio:</label>
                            <input type="text" id="nombre" class="form-control rounded-pill-custom" placeholder="Ej. Carpintería, Plomería..." required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-dark">Descripción:</label>
                            <textarea id="descripcion" class="form-control" rows="3" placeholder="Describe brevemente qué tipo de trabajos abarca esta categoría..." style="border-radius: 14px;" required></textarea>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill-custom" id="btnGuardar">Guardar Categoría</button>
                            <a href="categorias.html" class="btn btn-outline-dark rounded-pill-custom">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/categorias-registrar.js"></script>
</body>
</html>
