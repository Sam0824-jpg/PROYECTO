<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FyNe - Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <!-- Premium Monochromatic Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light py-3">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-2">
                    <!-- Icono FyNe con lupa y pin de mapa en negro -->
                    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-black">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <a class="navbar-brand" href="inicio.html">
                        FyNe
                        <span class="subtitle">Find your need</span>
                    </a>
                </div>
                
                <a href="inicio.html" class="nav-link ms-2 d-none d-md-block">Inicio</a>
                
                <!-- Botón de Tema (Sol) -->
                <button class="theme-toggle ms-2" aria-label="Cambiar tema">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></svg>
                </button>
            </div>

            <!-- Botones tipo Pill en el lado derecho -->
            <div class="d-flex align-items-center gap-2">
                <a href="categorias.html" class="nav-pill-btn bg-dark text-white border-dark">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Buscar
                </a>
                <a href="prestadores.html" class="nav-pill-btn d-none d-sm-flex">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                    Empleo
                </a>
                <a href="inicio.html" class="nav-pill-btn d-none d-sm-flex">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Mi Perfil
                </a>
                <button class="btn p-0 border-0 fs-4 text-black ms-1" style="background: none; outline: none;">
                    ☰
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <!-- Title and Subtitle -->
        <div class="text-center mb-5">
            <h1 class="fw-bold display-6 mb-3 text-dark">Explora Todas las Categorías</h1>
            <p class="text-muted mx-auto" style="max-width: 600px;">
                Encuentra el servicio perfecto organizado por sectores. Selecciona una categoría para ver los servicios disponibles.
            </p>
        </div>

        <!-- Search Bar matching mockup -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-7 text-center">
                <div class="position-relative mb-3">
                    <span class="position-absolute top-50 start-0 translate-middle-y ps-4 text-muted">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </span>
                    <input type="text" id="buscadorNombre" class="form-control form-control-lg input-pill border-light-gray ps-5" placeholder="Buscar una categoría, profesional o servicio..." onkeyup="buscarPorNombre()">
                </div>
                <button onclick="buscarPorNombre()" class="btn btn-primary btn-lg rounded-pill-custom px-5 py-3 w-75 fw-bold mb-4">Buscar</button>
            </div>
        </div>

        <!-- Mockup Pill Filters Under Search -->
        <div class="d-flex flex-wrap justify-content-center gap-2 mb-5">
            <button class="nav-pill-btn bg-white">📍 Más Cerca</button>
            <button class="nav-pill-btn bg-white">💲 Mejor Precio</button>
            <button class="nav-pill-btn bg-white">Calidad-Precio</button>
            <button class="nav-pill-btn bg-white">⭐ Mejor Calificación</button>
            <button class="nav-pill-btn bg-white">Abierto Ahora</button>
        </div>

        <!-- Header Actions: Register New Category -->
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-light-gray">
            <h4 class="fw-bold mb-0">Listado de Categorías</h4>
            <a href="categorias-registrar.html" class="btn btn-primary rounded-pill-custom btn-sm"> + Registrar Categoría</a>
        </div>

        <div id="alerta"></div>

        <!-- Categories List Container (Populated dynamically via JS) -->
        <div id="tablaCategorias" class="d-flex flex-column gap-3"></div>
    </div>
    
    <script src="./js/categorias.js"></script>
</body>
</html>
