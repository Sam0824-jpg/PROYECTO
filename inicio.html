<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FyNe - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary py-3">
        <div class="container">
            <span class="navbar-brand fw-bold fs-4">FindYourNeed</span>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-white fw-bold" id="nombreUsuario"></span>
                <button class="btn btn-outline-light btn-sm rounded-0" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div id="alerta"></div>
        <div id="spinner" class="text-center py-5">
            <div class="spinner-border text-dark"></div>
        </div>

        <div id="contenido" class="d-none">
            <div class="row mb-5">
                <div class="col-md-4">
                    <div class="card p-4 bg-light">
                        <h5 class="fw-bold border-bottom border-dark pb-2">INFORMACIÓN PERSONAL</h5>
                        <p class="mb-1 mt-3 text-muted">Nombre completo:</p>
                        <h4 class="fw-bold" id="perfilNombre"></h4>
                    </div>
                </div>
                <div class="col-md-8">
                    <h2 class="fw-bold mb-1" id="tituloBienvenida"></h2>
                    <p class="text-muted border-bottom border-dark pb-3" id="fechaHora"></p>
                    
                    <h4 class="fw-bold mt-4 mb-3">Gestión de Negocios y Plataforma</h4>
                    <div class="row g-4" id="tarjetasModulos"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/inicio.js"></script>
</body>
</html>
