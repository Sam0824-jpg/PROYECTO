<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FyNe - Registrar Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary py-3">
        <div class="container">
            <span class="navbar-brand fw-bold">Nueva Categoría</span>
            <a href="categorias.html" class="btn btn-outline-light rounded-0">Volver a la lista</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Añadir Oficio al Catálogo</h3>
                    <p class="text-muted">Crea una nueva categoría para agrupar a los trabajadores</p>
                </div>
                
                <div id="alerta"></div>
                
                <div class="card p-4">
                    <form onsubmit="event.preventDefault(); guardarCategoria()">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre del Oficio:</label>
                            <input type="text" id="nombre" class="form-control rounded-0" placeholder="Ej. Carpintería, Plomería..." required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Descripción:</label>
                            <textarea id="descripcion" class="form-control rounded-0" rows="3" placeholder="Describe brevemente qué tipo de trabajos abarca esta categoría..." required></textarea>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg" id="btnGuardar">Guardar Categoría</button>
                            <a href="categorias.html" class="btn btn-outline-dark">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/categorias-registrar.js"></script>
</body>
</html>
